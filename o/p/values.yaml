# Configuration de l'organisation et du projet
organization:
  name: "org1"  # Nom de l'organisation
  domain: "k8s.devver.app"  # Domaine principal

project:
  name: "proj1"  # Nom du projet
  #displayName: "projtest"  # Nom d'affichage

# Configuration du conteneur (OS Linux complet ou application)
container:
  image: "ubuntu/nginx"  # Image du conteneur (OS Linux ou application)
  port: 80  # Port exposé par le conteneur
  type: "app"
  
  command: []
  args: []
  
# Configuration des ressources
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "100m"

# Configuration de la persistance
persistence:
  enabled: true
  size: "10Gi"
  mountPath: "/data"  # Choix du répertoire à persister

# Configuration du nombre de replicas
replicaCount: 1

# Configuration des ports
ports:
  http: 80
  https: 443

# Labels et sélecteurs additionnels
labels: {}
annotations: {}