organization:
  name: "lc8q7su06yeg-s-organization"
  domain: "devver.app"
project:
  name: "oreus"
imagePullSecrets:
  - name: "ghcr-secret"
container:
  image: "ghcr.io/devver-inc/deploy-agent:latest"
  port: 80
  type: "app"
  command: []
  args: []
  env:
    DEVVER_SECRET: "dev-secret-123"
    NODE_ENV: "production"
    DEVVER_WIDGET_URL: "https://cdn.jsdelivr.net/gh/Devver-Inc/overlay@main/public/devver-overlay.iife.js"
resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"
persistence:
  enabled: true
  app:
    size: "10Gi"
    mountPath: "/app"
    storageClass: longhorn
  root:
    size: "5Gi"
    mountPath: "/root"
    storageClass: longhorn
replicaCount: 1
ports:
  http: 80
  https: 443
labels: {}
annotations: {}