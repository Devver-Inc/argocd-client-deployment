organization:
  name: test-overlay
  domain: devver.app
project:
  name: db
imagePullSecrets:
  - name: ghcr-secret
container:
  image: ghcr.io/devver-inc/deploy-agent:latest
  port: 80
  type: app
  command: []
  args: []
  env:
    DEVVER_SECRET: dev-secret-123
    NODE_ENV: production
    DEVVER_WIDGET_URL: >-
      https://cdn.jsdelivr.net/gh/Devver-Inc/overlay@dev/public/devver-overlay.iife.js
    DEVVER_MONGO_CONNECTION_STRING: >-
      mongodb://string:string@test-overlay-db-mongo:27017/admin?authSource=admin&tls=true&tlsAllowInvalidCertificates=true
resources:
  requests:
    memory: 512Mi
    cpu: 500m
  limits:
    memory: 2Gi
    cpu: 2000m
persistence:
  enabled: true
  app:
    size: 5Gi
    mountPath: /app
    storageClass: nfs-devver-prod
  root:
    size: 5Gi
    mountPath: /root
    storageClass: nfs-devver-prod
replicaCount: 1
ports:
  http: 80
  https: 443
labels: {}
annotations: {}
